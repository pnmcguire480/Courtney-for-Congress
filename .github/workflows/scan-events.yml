name: Scan RSS feeds for OH-11 events

on:
  schedule:
    # Every Monday and Thursday at 7:00 AM ET (11:00 UTC)
    - cron: '0 11 * * 1,4'
  workflow_dispatch: # Manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scan feeds for events
        run: node scripts/scan-events.js

      - name: Check for new events
        id: check
        run: |
          if git diff --quiet src/_data/events.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with discovered events
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Event Scanner"
          git config user.email "noreply@github.com"
          BRANCH="events/auto-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add src/_data/events.json
          git commit -m "Auto-discovered events from RSS feeds"
          git push origin "$BRANCH"
          gh pr create \
            --title "New events discovered from OH-11 news feeds" \
            --body "$(cat <<'EOF'
          ## Auto-discovered events

          The event scanner found new events in the OH-11 RSS feeds. Review and merge to publish.

          **Check each event for:**
          - [ ] Correct date and time
          - [ ] Relevant to the campaign
          - [ ] Not a duplicate
          EOF
          )" \
            --base main
