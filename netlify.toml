# Cortney for Congress — Netlify Configuration
# This file controls deployment, headers, and redirects

[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

# Security Headers — Applied to ALL responses
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # HTTPS enforcement (1 year, include subdomains, preload eligible)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Don't leak full URLs to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable dangerous browser APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # Content Security Policy
    # - default-src 'self': only load resources from our domain
    # - script-src 'self' 'unsafe-inline': external + inline JS (theme-init, onclick handlers)
    # - style-src 'self' 'unsafe-inline': inline styles in HTML files
    # - font-src 'self': self-hosted fonts (no external CDN)
    # - img-src: our images + data URIs + any HTTPS (for social previews)
    # - connect-src: our domain + Netlify Forms API
    # - frame-src: Anedot donation widget only
    # - frame-ancestors 'none': nobody can iframe us
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://api.netlify.com https://api.rss2json.com https://public.api.bsky.app https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com; frame-src https://secure.anedot.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    # Cross-origin policies
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects
[[redirects]]
  from = "https://www.cortneyforcongress.org/*"
  to = "https://cortneyforcongress.org/:splat"
  status = 301
  force = true

# Block access to private documents (invoices, agreements, PII)
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

# Block access to markdown planning files
[[redirects]]
  from = "/markdown/*"
  to = "/404.html"
  status = 404
  force = true

# Block access to Claude Code project files
[[redirects]]
  from = "/.claude/*"
  to = "/404.html"
  status = 404
  force = true

# Block access to archive directory (defense-in-depth, also in .gitignore)
[[redirects]]
  from = "/_archive/*"
  to = "/404.html"
  status = 404
  force = true

# Block access to brainstormer directory
[[redirects]]
  from = "/brainstormer/*"
  to = "/404.html"
  status = 404
  force = true

# Block access to source files (defense-in-depth — should not exist in _site output)
[[redirects]]
  from = "/src/*"
  to = "/404.html"
  status = 404
  force = true

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
